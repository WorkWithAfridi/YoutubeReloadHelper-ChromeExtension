<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Reload Helper</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 260px;
        padding: 12px;
      }

      h3 {
        margin: 0 0 12px 0;
        font-size: 16px;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
      }

      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
      }

      button {
        width: 100%;
        padding: 8px;
        cursor: pointer;
      }

      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h3>YouTube Reload Helper</h3>

    <div class="row">
      <label>
        <input type="checkbox" id="enabled" />
        Enable reload-once
      </label>
    </div>

    <div class="row">
      <label for="delayMs">Reload delay (ms)</label>
      <input type="number" id="delayMs" min="0" step="100" />
    </div>

    <button id="saveBtn">Save Settings</button>

    <div class="hint">Applies on YouTube watch pages.</div>

    <script src="popup.js"></script>
  </body>
</html>
